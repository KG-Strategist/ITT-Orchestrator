apiVersion: v2
name: itt-orchestrator
description: A Helm chart for the ITT-Orchestrator Intent-to-Task Control Plane
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - orchestrator
  - agent
  - control-plane
  - seag
maintainers:
  - name: ITT-Orchestrator Contributors
    email: contributors@itt-orchestrator.dev
home: https://github.com/anthropics/itt-orchestrator
sources:
  - https://github.com/anthropics/itt-orchestrator
dependencies:
  - name: mongodb
    version: "~13.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: neo4j
    version: "~5.0"
    repository: "https://neo4j.com/helm"
    condition: neo4j.enabled
