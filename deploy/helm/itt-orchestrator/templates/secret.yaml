apiVersion: v1
kind: Secret
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-secrets
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded secret values - replace with actual values
  # To generate: echo -n "value" | base64
  mongodb-username: {{ .Values.database.mongodb.username | b64enc | quote }}
  mongodb-password: {{ .Values.database.mongodb.password | default "changeme" | b64enc | quote }}
  mongodb-uri: {{ .Values.database.mongodb.uri | b64enc | quote }}
  neo4j-username: {{ .Values.database.neo4j.username | b64enc | quote }}
  neo4j-password: {{ .Values.database.neo4j.password | default "changeme" | b64enc | quote }}
  neo4j-uri: {{ .Values.database.neo4j.uri | b64enc | quote }}
  neo4j-auth: {{ printf "%s/%s" .Values.database.neo4j.username (.Values.database.neo4j.password | default "changeme") | b64enc | quote }}
