apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-otel-config
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128

    exporters:
      jaeger:
        endpoint: "{{ include "itt-orchestrator.fullname" . }}-jaeger:14250"
        tls:
          insecure: true
      logging:
        loglevel: debug

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [jaeger, logging]
