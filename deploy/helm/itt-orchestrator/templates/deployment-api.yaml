apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-api
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "itt-orchestrator.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "itt-orchestrator.selectorLabels" . | nindent 8 }}
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: {{ include "itt-orchestrator.serviceAccountName" . }}

      # Init container for database migrations
      initContainers:
      - name: db-migrate
        image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        imagePullPolicy: {{ .Values.image.api.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Waiting for MongoDB to be ready..."
            until nc -z {{ include "itt-orchestrator.fullname" . }}-mongodb 27017; do
              echo "MongoDB not ready, waiting..."
              sleep 2
            done
            echo "Waiting for Neo4j to be ready..."
            until nc -z {{ include "itt-orchestrator.fullname" . }}-neo4j 7687; do
              echo "Neo4j not ready, waiting..."
              sleep 2
            done
            echo "Databases are ready"
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "itt-orchestrator.fullname" . }}-secrets
              key: mongodb-uri
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "itt-orchestrator.fullname" . }}-secrets
              key: neo4j-uri

      containers:
      - name: api
        image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        imagePullPolicy: {{ .Values.image.api.pullPolicy }}

        ports:
        - name: http
          containerPort: 3001
          protocol: TCP
        - name: otel
          containerPort: 4317
          protocol: TCP

        # Startup probe: allow up to 30 seconds for binary to start
        startupProbe:
          httpGet:
            path: {{ .Values.healthCheck.path }}
            port: http
            scheme: HTTP
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}

        # Readiness probe: every 5 seconds
        readinessProbe:
          httpGet:
            path: {{ .Values.healthCheck.path }}
            port: http
            scheme: HTTP
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}

        # Liveness probe: every 10 seconds
        livenessProbe:
          httpGet:
            path: {{ .Values.healthCheck.path }}
            port: http
            scheme: HTTP
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}

        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "itt-orchestrator.fullname" . }}-secrets
              key: mongodb-uri
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "itt-orchestrator.fullname" . }}-secrets
              key: neo4j-uri
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "{{ .Values.otel.endpoint }}"
        - name: OTEL_SERVICE_NAME
          value: "{{ .Values.otel.serviceName }}"
        - name: RUST_LOG
          value: "{{ .Values.logging.rustLog }}"
        - name: RUST_BACKTRACE
          value: "1"

        resources:
          requests:
            cpu: {{ .Values.resources.api.requests.cpu }}
            memory: {{ .Values.resources.api.requests.memory }}
          limits:
            cpu: {{ .Values.resources.api.limits.cpu }}
            memory: {{ .Values.resources.api.limits.memory }}

        # Graceful shutdown: give 15s for in-flight requests before terminating
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

        # Security context: run as non-root
        securityContext:
          runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
          runAsUser: {{ .Values.securityContext.runAsUser }}
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        # Volume mounts for logs, cache, temp
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
        - name: cache
          mountPath: /app/cache

      # Node affinity: prefer nodes with "itt-workload=true" label
      affinity:
        {{- if .Values.affinity.api.nodeAffinity }}
        nodeAffinity:
          {{- toYaml .Values.affinity.api.nodeAffinity | nindent 10 }}
        {{- end }}
        {{- if .Values.affinity.api.podAntiAffinity }}
        podAntiAffinity:
          {{- toYaml .Values.affinity.api.podAntiAffinity | nindent 10 }}
        {{- end }}

      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      - name: cache
        emptyDir: {}

      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
