apiVersion: v1
kind: Service
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-neo4j
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
    component: neo4j
spec:
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 7687
    targetPort: bolt
    protocol: TCP
    name: bolt
  - port: 7474
    targetPort: http
    protocol: TCP
    name: http
  - port: 7473
    targetPort: https
    protocol: TCP
    name: https
  selector:
    {{- include "itt-orchestrator.selectorLabels" . | nindent 4 }}
    component: neo4j
