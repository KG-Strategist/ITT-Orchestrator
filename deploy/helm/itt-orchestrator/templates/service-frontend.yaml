apiVersion: v1
kind: Service
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-frontend
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "itt-orchestrator.selectorLabels" . | nindent 4 }}
    component: frontend
