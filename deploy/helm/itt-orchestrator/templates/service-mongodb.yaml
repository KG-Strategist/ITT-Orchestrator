apiVersion: v1
kind: Service
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-mongodb
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
    component: mongodb
spec:
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 27017
    targetPort: mongodb
    protocol: TCP
    name: mongodb
  selector:
    {{- include "itt-orchestrator.selectorLabels" . | nindent 4 }}
    component: mongodb
