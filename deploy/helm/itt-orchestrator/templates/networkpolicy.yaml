apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "itt-orchestrator.fullname" . }}-np
  labels:
    {{- include "itt-orchestrator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "itt-orchestrator.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow API traffic from Ingress Controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3001
    - protocol: TCP
      port: 3000

  # Allow API to API pod-to-pod
  - from:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
    ports:
    - protocol: TCP
      port: 3001

  # Allow Frontend to Frontend pod-to-pod
  - from:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
    ports:
    - protocol: TCP
      port: 3000

  egress:
  # Allow to MongoDB
  - to:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
          component: mongodb
    ports:
    - protocol: TCP
      port: 27017

  # Allow to Neo4j
  - to:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
          component: neo4j
    ports:
    - protocol: TCP
      port: 7687

  # Allow to OTEL Collector
  - to:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
          component: otel
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318

  # Allow to Jaeger
  - to:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
          component: jaeger
    ports:
    - protocol: TCP
      port: 14250
    - protocol: TCP
      port: 14268

  # Allow DNS to kube-dns
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow pod-to-self traffic
  - to:
    - podSelector:
        matchLabels:
          {{- include "itt-orchestrator.selectorLabels" . | nindent 14 }}
