name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend (Rust)
    
    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass

      neo4j:
        image: neo4j:5.15
        options: >-
          --health-cmd "wget --spider -q http://localhost:7474"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          NEO4J_AUTH: neo4j/testpass

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Rust/Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run Clippy (Linting)
        run: |
          cd backend
          cargo clippy --all-targets --all-features --workspace -- -D warnings

      - name: Run Tests
        run: |
          cd backend
          cargo test --verbose --workspace

      - name: Build Release
        run: |
          cd backend
          cargo build --release -p itt_api

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (TypeScript/React)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true  # Allow lint to fail for now

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependabot Alerts
        uses: dependabot/fetch-metadata@v1
        if: github.event_name == 'pull_request'

  build:
    needs: [test-backend, test-frontend, security-scan]
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    
    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: https://staging-api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_SERVER: ${{ secrets.STAGING_SERVER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_SERVER >> ~/.ssh/known_hosts
          
          ssh deploy@$DEPLOY_SERVER << 'EOF'
            cd /opt/itt-orchestrator
            git pull origin develop
            docker-compose pull
            docker-compose up -d
            docker-compose exec backend /app/itt_api --migrate
          EOF

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Production
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Create Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
            });
            console.log('Deployment created:', deployment.data.id);

      - name: Deploy to Production
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_SERVER: ${{ secrets.PROD_SERVER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_SERVER >> ~/.ssh/known_hosts
          
          ssh deploy@$DEPLOY_SERVER << 'EOF'
            set -e
            cd /opt/itt-orchestrator
            
            # Create backup
            docker-compose exec -T mongodb mongodump --uri="$MONGODB_URI" --out=/backups/$(date +%Y%m%d)
            
            # Deploy
            git pull origin main
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            
            # Health check
            for i in {1..30}; do
              if curl -f http://localhost:3001/health; then
                echo "Deployment successful"
                exit 0
              fi
              sleep 2
            done
            echo "Deployment health check failed"
            exit 1
          EOF

      - name: Update Deployment Status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ env.deployment_id }},
              state: 'success',
              environment_url: 'https://api.example.com',
              description: 'Production deployment successful',
            });

      - name: Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
