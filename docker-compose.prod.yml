# Production Docker Compose - Use with environment variables
# Example: docker-compose -f docker-compose.prod.yml up

version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: itt_mongodb_prod
    restart: always
    ports:
      - "127.0.0.1:27017:27017"  # Only internal access
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongodb_data_prod:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itt-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5.15
    container_name: itt_neo4j_prod
    restart: always
    ports:
      - "127.0.0.1:7687:7687"  # Only internal access
      - "127.0.0.1:7474:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data_prod:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itt-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: itt_redis_prod
    restart: always
    ports:
      - "127.0.0.1:6379:6379"  # Only internal access
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itt-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: itt-orchestrator:latest  # Use your registry
    container_name: itt_api_prod
    restart: always
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      NODE_ENV: production
      LOG_LEVEL: info
      
      MONGODB_URI: mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      
      TEST_MODE: "false"
      ENABLE_COST_ARBITRAGE: "true"
      ENABLE_SEMANTIC_FIREWALL: "true"
      
      CACHE_TTL_SECS: 600
      DATABASE_POOL_SIZE: 20
      RATE_LIMIT_PER_MINUTE: 100
      
      DPDP_ENABLED: "true"
      GDPR_ENABLED: "true"
      AUDIT_LOG_ENABLED: "true"
      
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_JAEGER_ENDPOINT: ${OTEL_JAEGER_ENDPOINT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - itt-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  mongodb_data_prod:
  neo4j_data_prod:
  redis_data_prod:

networks:
  itt-network-prod:
    driver: bridge
